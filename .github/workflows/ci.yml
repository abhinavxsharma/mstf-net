name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.4.0 torchvision==0.19.0 --index-url https://download.pytorch.org/whl/cpu
          pip install timm==0.9.16 scikit-learn opencv-python-headless pillow numpy pyyaml pytest

      - name: Run unit tests
        run: |
          pytest tests/test_model.py -v --tb=short

      - name: Smoke test import
        run: |
          python -c "
          from mstfnet import MSTFNet
          import torch
          model = MSTFNet()
          x = torch.randn(2, 3, 224, 224)
          logits, alpha, q_n = model(x)
          assert logits.shape == (2, 2)
          assert alpha.shape  == (2, 3)
          assert q_n.shape    == (2,)
          print('✅ Smoke test passed')
          print(f'   logits: {logits.shape}')
          print(f'   alpha : {alpha.shape}')
          print(f'   q_n   : {q_n.shape}')
          params = sum(p.numel() for p in model.parameters())/1e6
          print(f'   params: {params:.1f}M')
          "
