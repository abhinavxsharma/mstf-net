# ============================================================
# MSTF-Net — DeeperForensics-1.0 Training Config
#
# Frame source : gdrive:DF_Frames.zip
# Drive ID     : 1cD2NYdYXfjc6RZfbcc9GAMfw_0xDCzXg
# Size         : 4.67 GB
#
# Lightning AI paths (writable local SSD):
#   /teamspace/studios/this_studio  ← writable, resets each session
#   /teamspace/uploads              ← READ ONLY, never use
#
# Persistence via rclone → Google Drive
# ============================================================

dataset:
  name: deeperforensics
  frames_root: /teamspace/studios/this_studio/DF_Frames
  img_size: 224
  n_frames: 8          # paper protocol: 8 uniformly sampled frames

model:
  feature_dim: 256
  tau_min: 0.1
  tau_max: 2.0
  cls_dropout: 0.4

training:
  seeds: [42, 123, 456, 789, 1011]   # 5 seeds — paper protocol
  epochs: 10
  batch_size: 512
  lr: 2.0e-4
  weight_decay: 0.0
  grad_clip_norm: 1.0
  early_stopping_patience: 4
  amp: true

optimizer:
  name: adamw
  betas: [0.9, 0.999]
  eps: 1.0e-8

paths:
  frames_root:    /teamspace/studios/this_studio/DF_Frames
  checkpoint_dir: /teamspace/studios/this_studio/MSTF_checkpoints
  results_dir:    /teamspace/studios/this_studio/MSTF_results

wandb:
  enabled: true
  project: mstf-net
  entity: i-abhinavxsharma
  tags: [deeperforensics, issmad2026, deepfake-detection]

huggingface:
  enabled: true
  repo_id: ixabhinavsharma/mstf-net
